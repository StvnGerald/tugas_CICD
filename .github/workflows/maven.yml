name: Build Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # Diupdate ke versi stabil terbaru
    
    # 1. KITA UBAH KE JAVA 17 DI SINI BIAR SONARCLOUD TIDAK ERROR
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 2. HANYA JALANKAN RECOMPILATION & TEST (Tanpa paksa kirim ke akun Sonar orang lain)
    - name: Build and Test
      run: mvn clean verify
